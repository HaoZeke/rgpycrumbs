[workspace]
authors     = [ "Rohit Goswami <rgoswami[at]ieee[dot]org>" ]
channels    = [ "conda-forge", "https://repo.prefix.dev/rg-forge" ]
description = "A dispatcher-based analytical and visualization suite for chemical physics"
name        = "pycrumbs"
platforms   = [ "linux-64" ]
version     = "1.3.1.dev"

[feature.test.tasks.cov-clean]
cmd = "find . -maxdepth 1 -name '.coverage*' -delete 2>/dev/null; true"

[feature.test.tasks.cov]
cmd = "python -m coverage combine .coverage.test .coverage.surfaces .coverage.fragments .coverage.eonmlflow .coverage.ptm 2>/dev/null; python -m coverage combine 2>/dev/null; python -m coverage report"
depends-on = [
  "cov-clean",
  "test-base",
  { task = "test-surfaces", environment = "surfaces" },
  { task = "test-fragments", environment = "fragments" },
  { task = "test-eonmlflow", environment = "eonmlflow" },
  { task = "test-ptm", environment = "ptm" },
]

[feature.test.tasks.test-base]
cmd = "bash -c 'export COVERAGE_FILE=.coverage.test && python -m coverage run --source=rgpycrumbs -m pytest tests/ -q; true'"

[feature.surfaces.tasks.test-surfaces]
cmd = "bash -c 'export COVERAGE_FILE=.coverage.surfaces && python -m coverage run --source=rgpycrumbs -m pytest tests/ -m surfaces -q; true'"

[feature.fragments.tasks.test-fragments]
cmd = "bash -c 'export COVERAGE_FILE=.coverage.fragments && python -m coverage run --source=rgpycrumbs -m pytest tests/ -m \"fragments or ira or align\" -q; true'"

[feature.eonmlflow.tasks.test-eonmlflow]
cmd = "bash -c 'export COVERAGE_FILE=.coverage.eonmlflow && python -m coverage run --source=rgpycrumbs -m pytest tests/ -m eon -q; true'"

[feature.ptm.tasks.test-ptm]
cmd = "bash -c 'export COVERAGE_FILE=.coverage.ptm && python -m coverage run --source=rgpycrumbs -m pytest tests/ -m ptm -q; true'"

[dependencies]
python = ">=3.10"

[feature.docs.dependencies]
adjusttext     = ">=1.3.0,<2"
ase            = ">=3.27.0,<4"
emacs          = ">=30.2,<31"
mlflow         = ">=3.8.1,<4"
nodejs         = ">=25.2.1,<25.3"
numpy          = ">=2.4.1,<3"
pandoc         = ">=3.9,<4"
sphinx-favicon = ">=1.0.1,<2"

[feature.docs.pypi-dependencies]
autodoc-pydantic            = ">=2.2.0, <3"
chemparseplot               = ">=1.2.0, <2"
pychum                      = ">=0.1.0, <0.2"
rgpycrumbs                  = { path = ".", editable = true }
shibuya                     = ">=2025.12.13, <2026"
sphinx                      = ">=9.0.4, <10"
sphinx-autoapi              = ">=3.6.0, <4"
sphinx-click                = ">=6.2.0, <7"
sphinx-sitemap              = ">=2.9.0, <3"
sphinxcontrib-programoutput = ">=0.18, <0.19"
sphobjinv                   = ">=2.3.1.3, <3"

[environments]
bench     = { features = [ "bench", "surfaces", "test" ], solve-group = "default" }
docs      = { features = [ "docs" ] }
eonmlflow = { features = [ "eonmlflow", "test" ] }
fragments = { features = [ "fragments", "test" ] }
ptm       = { features = [ "ptm", "test" ] }
surfaces  = { features = [ "surfaces", "test" ] }
test      = { features = [ "test" ] }

[pypi-options]
# GPU/CPU resolution is handled by rgpycrumbs._aux._has_cuda() at import
# time; no need for a hardcoded PyTorch CPU index here. If your shell sets
# UV_EXTRA_INDEX_URL or PIP_EXTRA_INDEX_URL, unset them to avoid pulling
# incompatible wheels from the PyTorch index for non-torch packages.

[feature.eonmlflow.dependencies]
eon    = ">=2.8.2,<3"
mlflow = ">=3.8.0,<4"

[feature.fragments.pypi-dependencies]
ase          = "~=3.23"
cmcrameri    = ">=1.9, <2"
solvis-tools = ">=0.1"

[feature.fragments.dependencies]
gfortran       = ">=15.2.0,<15.3"
ira            = ">=2.2.0,<3"
libgfortran-ng = ">=15.2.0,<16"
matplotlib     = ">=3.10.8,<4"
pyvista        = ">=0.46.4,<0.47"
tblite-python  = ">=0.5.0,<0.6"

[feature.test.pypi-dependencies]
adjusttext    = ">=1.3"
chemparseplot = ">=1.5.4"
click         = ">=8.3.1, <9"
cmcrameri     = ">=1.7"
matplotlib    = ">=3.8"
numpy         = ">=2.3.5, <3"
pandas        = ">=2.0"
plotnine      = ">=0.13"
polars        = ">=0.20"
pychum        = ">=0.1"
pytest        = "*"
pytest-cov    = ">=4.1"
pytest-pep723 = ">=0.1.0"
requests      = ">=2.31"
jax           = ">=0.4"
ovito         = ">=3.14"
pyvista       = ">=0.46"
solvis-tools  = ">=0.1"
xyzrender     = ">=0.1.3"
rgpycrumbs    = { path = ".", editable = true }
rich          = ">=13.0"
scipy         = ">=1.11"
readcon       = ">=0.7.0"

[feature.test.dependencies]
ase  = ">=3.23,<4"
h5py = ">=3.0"

[feature.surfaces.pypi-dependencies]
jax = ">=0.4"

[feature.ptm.dependencies]
ovito = "*"

[feature.ptm.pypi-dependencies]
ase   = ">=3.26.0, <4"
ovito = ">=3.14.1, <4"

[feature.bench.dependencies]
pip = "*"

[feature.bench.pypi-dependencies]
asv        = ">=0.6"
rgpycrumbs = { path = ".", editable = true }

[feature.docs.tasks.minify]
cmd = """
npx html-minifier-terser \
  --input-dir docs/build \
  --output-dir docs/build \
  --file-ext html \
  --collapse-whitespace \
  --remove-comments \
  --minify-js true \
  --minify-css true
"""


[feature.test.tasks.genfigs]
cmd = "python docs/generate_tutorial_figs.py && python docs/generate_singleended_figs.py"

[feature.docs.tasks.docbld]
depends-on = [
  { task = "genfigs", environment = "test" },
  "mkrst",
  "sphinxbld",
]

[feature.docs.tasks.sphinxbld]
cmd = """
sphinx-build docs/source/ docs/build
"""
depends-on = [ { task = "mkrst", environment = "docs" } ]

[feature.docs.tasks.mkrst]
cmd = """
pandoc ../CODE_OF_CONDUCT.md -o ../CODE_OF_CONDUCT.rst && \
emacs --batch --load export.el
"""
cwd = "docs"

[feature.docs.tasks.docdel]
cwd = "docs"
# removes files generated by sphinx and orgmode
cmd = """
rm -rf build
rm -rf source/*.rst
"""
