# Minimal rgpkgs eOn plot config
# rgpycrumbs eon plt-neb --config plot_config.example.toml
# rgpycrumbs eon plt-min --config plot_config.example.toml
#
# Surface-fit options (auto_thin, max_surface_points, surface_type) live here,
# not as extra CLI flags. Defaults: auto_thin=false, max_surface_points=64.

[shared]
energy_unit = "eV"
theme = "ruhi"
dpi = 200
figsize = [5.37, 5.37]
strip_renderer = "xyzrender"
xyzrender_config = "paton"
ira_kmax = 14.0
auto_thin = false
max_surface_points = 64

[neb]
con_file = "neb.con"
plot_type = "landscape"
output_file = "neb_landscape.pdf"
title = "NEB path"
plot_structures = "crit_points"
surface_type = "rbf"

[min]
job_dir = ["minimization_run"]
plot_type = "profile"
output = "min_profile.pdf"
prefix = "minimization"
surface_type = "grad_matern"
# For dense LBFGS movies (every force eval):
# plot_type = "landscape"
# surface_type = "grad_imq"
# auto_thin = true
# max_surface_points = 64

[saddle]
job_dir = ["saddle_run"]
plot_type = "profile"
output = "saddle_profile.pdf"
