name: Test Tutorials

on:
  push:
    branches: [main, docs/tutorial-improvements]
  pull_request:
    branches: [main]

jobs:
  test-tutorials:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Test remaining chemgp modules compile
        run: |
          uv run python3 -m py_compile rgpycrumbs/chemgp/__init__.py
          echo "All chemgp modules compile"

      - name: Test eon modules compile
        run: |
          uv run python3 -m py_compile rgpycrumbs/eon/to_mlflow.py
          echo "All eon modules compile"

      - name: Test CLI registration
        run: |
          uv run --extra test python3 -c "
          from rgpycrumbs.cli import main
          assert 'eon' in main.commands, 'eon command missing'
          print('All CLI commands registered')
          "
