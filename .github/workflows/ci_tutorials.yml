name: Test Tutorials

on:
  push:
    branches: [main, docs/tutorial-improvements]
  pull_request:
    branches: [main]

jobs:
  test-tutorials:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      
      - name: Test chemgp modules compile
        run: |
          uv run python3 -m py_compile rgpycrumbs/chemgp/hdf5_io.py
          uv run python3 -m py_compile rgpycrumbs/chemgp/plotting.py
          uv run python3 -m py_compile rgpycrumbs/chemgp/plot_gp.py
          echo "✓ All chemgp modules compile"
      
      - name: Test eon modules compile
        run: |
          uv run python3 -m py_compile rgpycrumbs/eon/plt_neb.py
          echo "✓ All eon modules compile"
      
      - name: Test batch command help
        run: |
          uv run --extra test python3 -m rgpycrumbs.cli chemgp batch --help
          echo "✓ Batch command works"
      
      - name: Test CLI registration
        run: |
          uv run --extra test python3 -c "
          from rgpycrumbs.cli import main
          assert 'chemgp' in main.commands, 'chemgp command missing'
          assert 'eon' in main.commands, 'eon command missing'
          print('✓ All CLI commands registered')
          "
